name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          cache: true

      - name: Cache ~/.elm
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: elm-${{ hashFiles('elm.json', 'review/elm.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Check formatting
        run: pnpm format:check

      - name: Run elm-review
        run: pnpm review

      - name: Build benchmarks
        run: pnpm bench:build

      - name: Run benchmark cross-check tests
        run: pnpm bench:test
